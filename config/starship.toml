format = """
[ Óā∂](#3B4252)\
$username\
[Óāį](bg:#434C5E fg:#3B4252)\
$directory\
[Óāį](fg:#434C5E bg:#4C566A)\
$git_branch\
$git_status\
$git_commit\
[Óāį](fg:#4C566A bg:#86BBD8)\
$c\
$java\
$python\
[Óāį](fg:#86BBD8 bg:#06969A)\
