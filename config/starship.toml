"""

command_timeout = 5000
# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like ÔĄ†  to save some space
[username]
show_always = true
style_user = "bg:#3B4252"
style_root = "bg:#3B4252"
format = '[ $user ]($style)'

[directory]
style = "bg:#434C5E"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "
"Wallpapers" = "ÔÄĺ "

[git_branch]
symbol = "Óúā "
style = "bg:#4C566A"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#4C566A"
format = '[$all_status$ahead_behind ]($style)'

[git_commit]
style = "bg:#4C566A"
format = '[$hash$tag ]($style)'
commit_hash_length = 7
only_detached = false

[java]
symbol = " ÓČĖ"
style = " fg:#06969A bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = " Óúľ"
style = "fg:#06969A bg:#86BBD8"
format = '[$symbol (\($virtualenv\) )]($style)'

[c]
symbol = " Óėě"
style = "fg:#06969A bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#33658A"
format = '[ $time ]($style)'
